# API base path
server.servlet.context-path=/api/v1/book-keeping

# Example local config (copy to application-local.properties and adjust)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/book_keeping}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (run manually via Maven)
spring.flyway.enabled=false

# jwt
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
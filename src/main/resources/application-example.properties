# API base path
server.servlet.context-path=/api/v1/book-keeping

# Example local config (copy to application-local.properties and adjust)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/book_keeping}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (run manually via Maven)
spring.flyway.enabled=false

# jwt
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Receipt processing
app.receipts.storage-path=${RECEIPT_STORAGE_PATH:uploads/receipts}
app.receipts.max-upload-bytes=${RECEIPT_MAX_UPLOAD_BYTES:10485760}
app.receipts.max-image-dimension=${RECEIPT_MAX_IMAGE_DIMENSION:1600}
app.receipts.jpeg-quality=${RECEIPT_JPEG_QUALITY:0.75}

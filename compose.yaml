services:
  postgres:
    image: postgres:16-alpine
    container_name: book-keeping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-book_keeping}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-book_keeping}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-keeping-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-book_keeping}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-VGhpc0lzQVRlc3RTZWNyZXRLZXlGb3JKV1RUaGF0SXNMb25nRW5vdWdo}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      RECEIPT_STORAGE_PATH: /app/uploads/receipts
      RECEIPT_MAX_UPLOAD_BYTES: ${RECEIPT_MAX_UPLOAD_BYTES:-10485760}
      RECEIPT_MAX_IMAGE_DIMENSION: ${RECEIPT_MAX_IMAGE_DIMENSION:-1600}
      RECEIPT_JPEG_QUALITY: ${RECEIPT_JPEG_QUALITY:-0.75}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${APP_PORT:-9095}:8080"
    volumes:
      - receipt-data:/app/uploads/receipts

volumes:
  postgres-data:
  receipt-data:
